name: Release

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  APP_NAME: ShootPorter
  PROJECT_PATH: src/ShootPorter.App/ShootPorter.App.csproj
  PUBLISH_DIR: publish
  RELEASES_DIR: releases

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Extract version from Directory.Build.props
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Install vpk tool
        run: dotnet tool install -g vpk

      - name: Publish application
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          -r win-x64
          --self-contained
          -o ${{ env.PUBLISH_DIR }}

      - name: Download previous release (for deltas)
        run: >
          vpk download github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Pack with Velopack
        run: >
          vpk pack
          --packId ${{ env.APP_NAME }}
          --packVersion ${{ steps.version.outputs.version }}
          --packDir ${{ env.PUBLISH_DIR }}
          --mainExe ${{ env.APP_NAME }}.exe
          --packTitle "${{ env.APP_NAME }}"
          --icon src/ShootPorter.App/Assets/shootporter-icon.ico
          --outputDir ${{ env.RELEASES_DIR }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ${{ env.APP_NAME }} v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ env.RELEASES_DIR }}/*
